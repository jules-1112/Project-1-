<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commission Calculator!!!</title>
  <link rel="stylesheet" href="Sty.Css" />
</head>
<body>
  <main class="card">
    <h1>Commission Calculator!!!</h1>

    <label for="salePrice">Sale Price ($)</label>
    <input id="salePrice" type="number" placeholder="e.g., 450000" min="0" step="1000" />

    <div class="row">
      <div>
        <label for="commissionRate">Commission Rate (%)</label>
        <input id="commissionRate" type="number" value="3" min="0" step="0.1" />
      </div>

      <div>
        <label for="brokerSplit">Broker Split (%)</label>
        <input id="brokerSplit" type="number" value="30" min="0" max="100" step="1" />
      </div>
    </div>

    <button id="calcBtn">Calculate</button>

    <section class="results" aria-live="polite">
      <div class="result">
        <span>Agent Commission</span>
        <strong id="agentCommission">$0.00</strong>
      </div>
      <div class="result">
        <span>Broker Split</span>
        <strong id="brokerTake">$0.00</strong>
      </div>
      <div class="result">
        <span>Net Income</span>
        <strong id="netIncome">$0.00</strong>
      </div>
      <p class="error" id="errorMsg"></p>
    </section>

    <button id="exportBtn" class="export-btn">Download PDF</button>
    
    <div class="button-group">
      <button id="nextPageBtn" class="next-btn">Go to Page 2</button>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="App.js"></script>
</body>
</html>
